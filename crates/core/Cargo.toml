[package]
name = "sendgrid-core"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
description = "Typed, validated Rust client for the SendGrid v3 API — all 391 operations, generated from the official OpenAPI spec. The runtime engine behind the sendgrid agent CLI and MCP server."
readme = "README.md"
keywords = ["sendgrid", "email", "api", "client", "openapi"]
categories = ["api-bindings", "email"]

[dependencies]
serde.workspace = true
serde_json.workspace = true
thiserror.workspace = true
# JSON Schema 2020-12 body validation. Same version the workspace pins (used by
# xtask's L1 gate). 0.46 builds all drafts in by default — the old `draft202012`
# feature is obsolete; we force the dialect at build time via `draft202012::options()`.
jsonschema.workspace = true

# HTTP — pure-Rust ring TLS (NOT aws-lc). reqwest 0.13 removed the per-roots
# feature variants; rustls roots now default to `rustls-platform-verifier` (the
# OS trust store). To keep the Mozilla trust anchors compiled INTO the binary —
# the right call for the headless/container agents we target, where no OS root
# store may exist (the bare default would fail every handshake `UnknownIssuer`) —
# `runtime::http` builds an explicit `rustls::ClientConfig` (ring provider +
# `webpki-roots`) and hands it to reqwest via `tls_backend_preconfigured`. The
# `rustls-no-provider` feature enables reqwest's rustls backend WITHOUT pulling
# the aws-lc-rs provider; reqwest's rustls deps are `default-features = false`, so
# no aws-lc is dragged in transitively.
reqwest = { version = "0.13", default-features = false, features = [
    "json",
    # 0.13 gated `RequestBuilder::query` behind its own feature (always-on in 0.12).
    "query",
    "http2",
    "rustls-no-provider",
] }
# Mozilla trust anchors for the explicit rustls ClientConfig (see runtime::http).
# reqwest 0.13 no longer compiles these in behind a feature, so we depend on them
# directly — still a single resolved copy (reqwest 0.12 pulled this transitively).
webpki-roots = "1"
rustls = { version = "0.23", default-features = false, features = [
    "ring",
    "std",
    "tls12",
] }
# Provider-neutral HTTP types (StatusCode / HeaderMap) used in the dispatcher seam.
http = "1"

# Secret handling: redacted Debug, no Serialize, zeroize on drop.
secrecy = "0.10"
# Defense-in-depth scrub regex for the canonical SendGrid key format.
regex = "1"
# Runtime-agnostic async timer for retry backoff. Lets the retry engine sleep
# WITHOUT binding core to tokio (consumers own the runtime); works under any
# executor. The only "extra" dep beyond the brief's list — justified by item 9
# (retry/backoff) needing an async sleep in a runtime-neutral library.
futures-timer = "3"

[dev-dependencies]
# core is a library: consumers own the async runtime. tokio is dev-only, for tests.
tokio = { version = "1", features = ["macros", "rt-multi-thread", "time"] }
# L2 golden-request snapshots over the dry-run build path. The `json` feature
# enables `assert_json_snapshot!`; committed `.snap` files keep the suite
# deterministic (no live network).
insta = { version = "1", features = ["json"] }
# L3 contract tests: a localhost SendGrid mock the real ReqwestDispatcher drives
# end-to-end — exercises reqwest's header serialization, no-follow redirect policy,
# and the retry/pagination engines over real HTTP (not a hand-rolled dispatcher).
wiremock = "0.6"
