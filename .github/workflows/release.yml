name: release

# Publish all public crates to crates.io when a version tag (vX.Y.Z) is pushed.
#
# Release procedure:
#   1. Bump `version` in [workspace.package] in the root Cargo.toml.
#   2. `cargo build` to refresh Cargo.lock (the workspace crates' versions live
#      there too, so `--locked` below would otherwise fail), then commit both.
#   3. `git tag vX.Y.Z && git push origin vX.Y.Z`.
#
# `cargo publish --workspace` verify-builds and uploads the crates in dependency
# order (sendgrid-core -> sendgrid-mcp -> sendgrid-cli; xtask is publish = false).
#
# Requires a `CARGO_REGISTRY_TOKEN` repository secret — a crates.io API token
# (Account Settings -> API Tokens) scoped to publish-new + publish-update.
on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Same pin as ci.yml: the workspace declares `rust-version = "1.96"`, so the
      # active toolchain MUST be >= 1.96 or cargo hard-errors.
      - name: Install Rust 1.96.0
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96.0"

      - uses: Swatinem/rust-cache@v2

      # Guard against a tag/version mismatch (e.g. tag v0.2.0 while Cargo.toml
      # still says 0.1.0), which would otherwise publish the wrong version.
      - name: Verify tag matches workspace version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          ver="$(cargo metadata --no-deps --format-version 1 \
            | python3 -c 'import sys,json;d=json.load(sys.stdin);print(next(p["version"] for p in d["packages"] if p["name"]=="sendgrid-cli"))')"
          if [ "$tag" != "$ver" ]; then
            echo "::error::tag v$tag does not match workspace version $ver"
            exit 1
          fi
          echo "Publishing v$ver"

      - name: Publish to crates.io
        run: cargo publish --workspace --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
