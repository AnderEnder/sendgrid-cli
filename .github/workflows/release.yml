# Release pipeline — modeled on AnderEnder/rss-cli and s3find-rs.
#
# Fires on a SemVer tag (e.g. `git tag v0.2.0 && git push origin v0.2.0`):
#   - publishes the workspace crates to crates.io, and
#   - cross-compiles the `sendgrid` binary for 5 targets and attaches the tarballs
#     to a GitHub Release for the tag.
#
# No debuginfo sidecars: this workspace's [profile.release] sets `strip = true`, so
# the shipped binary carries no symbols to split out (unlike rss-cli).
#
# Prerequisites / gotchas:
#   - `cargo publish` ships the version in Cargo.toml, NOT the tag. Bump `version`
#     in [workspace.package] (and run `cargo build` to refresh Cargo.lock) before
#     tagging, or you republish the old version.
#   - Requires repo secret `CARGO_TOKEN` (crates.io API token). `GITHUB_TOKEN` is
#     provided automatically for the release uploads.
#   - `cargo publish --workspace` publishes sendgrid-core -> sendgrid-mcp ->
#     sendgrid-cli in dependency order (xtask is publish = false). The `|| true`
#     lets a re-tag of an already-published version pass; it does NOT prove all
#     three crates landed — verify on crates.io after the first real tag.
#   - The two static-musl jobs build reqwest+rustls under clux/muslrust. This crate
#     uses rustls' ring provider + webpki-roots (not aws-lc), the musl-friendly
#     path, but it's still the most likely first-tag failure point — check there.

name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*.*.*'

env:
  CARGO_TERM_COLOR: always

jobs:
  release-crates:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ubuntu-x86_64
      - name: Publish workspace to crates.io
        run: cargo publish --workspace --token ${{ secrets.CARGO_TOKEN }} || true

  release-linux:
    name: Linux x86_64 (static musl)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Static release build
        run: |
          docker run --rm -t \
            -v "$(pwd)":/volume \
            clux/muslrust:stable cargo build --release --bin sendgrid
      - name: Archive binary
        run: sudo tar -C target/x86_64-unknown-linux-musl/release -czf "$(pwd)/sendgrid-x86_64-linux.tar.gz" sendgrid
      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          files: sendgrid-x86_64-linux.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-linux-arm:
    name: Linux aarch64 (static musl)
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Static release build
        run: |
          docker run --rm -t \
            -v "$(pwd)":/volume \
            clux/muslrust:stable cargo build --release --bin sendgrid
      - name: Archive binary
        run: sudo tar -C target/aarch64-unknown-linux-musl/release -czf "$(pwd)/sendgrid-aarch64-linux.tar.gz" sendgrid
      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          files: sendgrid-aarch64-linux.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-osx:
    name: macOS aarch64
    runs-on: macOS-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: macos-aarch64
      - name: Build release
        run: cargo build --release --bin sendgrid --verbose
      - name: Archive binary
        run: tar -C target/release -czf "$(pwd)/sendgrid-aarch64-osx.tar.gz" sendgrid
      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          files: sendgrid-aarch64-osx.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-osx-x86_64:
    name: macOS x86_64
    runs-on: macos-15-intel
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: macos-x86_64
      - name: Build release
        run: cargo build --release --bin sendgrid --verbose
      - name: Archive binary
        run: tar -C target/release -czf "$(pwd)/sendgrid-x86_64-osx.tar.gz" sendgrid
      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          files: sendgrid-x86_64-osx.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-windows:
    name: Windows x86_64
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: windows-x86_64
      - name: Build release
        run: cargo build --release --bin sendgrid --verbose
      - name: Archive binary
        run: tar -C target/release -czf "$(pwd)/sendgrid-x86_64-windows.tar.gz" sendgrid.exe
        shell: bash
      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          files: sendgrid-x86_64-windows.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
