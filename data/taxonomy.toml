# CLI taxonomy — the curated map from spec namespace (filename minus `tsg_`/`_v3`)
# to its `(domain, subgroup, hidden)` slot. Source of truth: .research-notes/r2-taxonomy.md
# (the 46-row table + deliberate overrides). `(domain, subgroup)` is 1:1 with the
# file, which is what dissolves all 26 cross-file operationId collisions.
#
# Collapse rule (applied in codegen, NOT here): when `subgroup == domain`, the
# subgroup level is dropped from both `cli_path` and `id`.
#
# `hidden` resolves the two product calls r2 flagged `hide?`:
#   - mc_segments (segments-v1): hidden = true  (superseded by Segments 2.0)
#   - ips (legacy):              hidden = false (user decision: stays visible)
# The lmc_* "Legacy"-titled trio is hidden by default.

[namespaces.mail]
domain = "mail"
subgroup = "send"

[namespaces.mc_test]
domain = "mail"
subgroup = "test"

[namespaces.scheduled_sends]
domain = "mail"
subgroup = "scheduled"

[namespaces.mc_contacts]
domain = "marketing"
subgroup = "contacts"

[namespaces.mc_lists]
domain = "marketing"
subgroup = "lists"

# Override: canonical Segments 2.0 gets the clean `segments` name.
[namespaces."mc_segments_2.0"]
domain = "marketing"
subgroup = "segments"

# Override: superseded v1 gets the suffixed name and is hidden by default.
[namespaces.mc_segments]
domain = "marketing"
subgroup = "segments-v1"
hidden = true

[namespaces.mc_custom_fields]
domain = "marketing"
subgroup = "fields"

[namespaces.mc_senders]
domain = "marketing"
subgroup = "senders"

[namespaces.mc_singlesends]
domain = "marketing"
subgroup = "singlesends"

[namespaces.mc_designs]
domain = "marketing"
subgroup = "designs"

[namespaces.mc_stats]
domain = "marketing"
subgroup = "stats"

[namespaces.integrations]
domain = "marketing"
subgroup = "integrations"

[namespaces.lmc_campaigns]
domain = "legacy"
subgroup = "campaigns"
hidden = true

[namespaces.lmc_contactdb]
domain = "legacy"
subgroup = "contactdb"
hidden = true

[namespaces.lmc_senders]
domain = "legacy"
subgroup = "senders"
hidden = true

# subgroup == domain → collapsed to `sendgrid templates <verb>-<noun>`.
[namespaces.templates]
domain = "templates"
subgroup = "templates"

# Override: IP Address Management is canonical (combines old IP Address + IP Pools).
[namespaces.ip_address_management]
domain = "ips"
subgroup = "manage"

# Override: older /v3/ips is legacy but stays visible (user decision).
[namespaces.ips]
domain = "ips"
subgroup = "legacy"
hidden = false

[namespaces.ip_access_management]
domain = "ips"
subgroup = "access"

