# ---------------------------------------------------------------------------
# Leaf derivation: operationId (PascalCase) → `<verb> <noun>`.
# The split + lowercasing is in code (r2 §b); `known_verbs` is the documented
# verb lexicon, used only to WARN on an unrecognized leading verb (spec drift
# signal). Because every lexicon entry maps to its own lowercase form, the verb
# is always `lowercase(first_token)` — the lexicon never changes the output.
[leaf]
known_verbs = [
  "list", "get", "create", "update", "delete", "add", "remove", "export",
  "import", "search", "duplicate", "activate", "refresh", "schedule",
  "authenticate", "reset", "validate", "send", "test", "download", "cancel",
  "pause", "resume",
]

# ---------------------------------------------------------------------------
# id_alias: the one well-spelled alias for a spec typo. `CreatAsmGroup` (missing
# the second 'e') is the real operationId in tsg_suppressions; expose the
# correctly-spelled id as an alias so callers that type it still resolve.
[[id_alias]]
namespace = "suppressions"
operation_id = "CreatAsmGroup"
alias = "CreateAsmGroup"
